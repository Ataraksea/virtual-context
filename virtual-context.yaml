# virtual-context configuration — agentic preset
# Generated by: virtual-context init agentic
# Docs: https://github.com/virtual-context/virtual-context
#
# Balanced defaults for autonomous agent conversations across any domain.
# Tags emerge from conversation — no predefined domains to configure.

version: "0.2"
storage_root: ".virtualcontext"
context_window: 64000
token_counter: "estimate"

paging:
  enabled: true
  auto_promote: true
  auto_evict: true
  max_tool_loops: 10

tag_generator:
  type: "llm"
  provider: "vertex_flush_memories"  # ↔ Hermes auxiliary.flush_memories
  model: "google/gemini-3.5-flash"
  max_tags: 10
  min_tags: 5
  max_tokens: 8192
  prompt_mode: "compact"
  context_lookback_pairs: 5
  context_bleed_threshold: 0.1
  temporal_heuristic_enabled: true
  keyword_fallback:
    tag_keywords:
      legal: [court, filing, motion, attorney, judge, case]
      medical: [medication, doctor, lab, symptom, dose, blood]
      code: [function, bug, deploy, git, API, database, error]
    tag_patterns:
      legal:
        - "\\b\\d{2}-cv-\\d+\\b"
        - "\\bN\\.?J\\.?S\\.?A\\.?\\b"
      code:
        - "\\bdef \\w+\\("
        - "\\bclass \\w+[:(]"

tag_rules:
  - match: "legal*"
    priority: 9
  - match: "medical*"
    priority: 8
  - match: "debug*"
    priority: 7
  - match: "*"
    priority: 5

compaction:
  soft_threshold: 0.70
  hard_threshold: 0.85
  protected_recent_turns: 6
  overflow_buffer: 1.2
  summary_ratio: 0.15
  min_summary_tokens: 200
  max_summary_tokens: 2000
  max_concurrent_summaries: 4
  llm_token_overhead: 2000

summarization:
  provider: "vertex_compression"  # ↔ Hermes auxiliary.compression
  model: "google/gemini-3.5-flash"
  max_tokens: 1000
  temperature: 0.3

providers:
  # Google Vertex AI via its OpenAI-compatible endpoint. The base_url and the
  # OAuth bearer token are derived automatically from the service-account JSON
  # (project_id + a refreshed access token) — do NOT set base_url/api_key here.
  #
  # Each entry below mirrors a Hermes Agent auxiliary model type from
  # config.yaml (auxiliary.*). They all currently point at the same model
  # (google/gemini-3.5-flash) but carry that aux type's timeout, so individual
  # VC components track the closest Hermes aux model. Change a model/timeout in
  # one place to re-tune just that component.
  # NOTE: gemini-3.5-flash is a "thinking" model — it spends output budget on
  # reasoning tokens before answering. For these structured-JSON aux tasks that
  # is wasted latency/cost (and can starve smaller token budgets), so each entry
  # sets extra_body.reasoning_effort to keep thinking minimal.
  vertex_flush_memories:   # ↔ auxiliary.flush_memories  (per-turn tag + fact extraction)
    type: "vertex"
    credentials_path: "D:/AppData/Local/hermes/janeagi-496912-d8d1d7f16e80.json"
    region: "global"
    model: "google/gemini-3.5-flash"
    timeout: 30
    extra_body:
      reasoning_effort: "minimal"
  vertex_compression:      # ↔ auxiliary.compression  (conversation summarization)
    type: "vertex"
    credentials_path: "D:/AppData/Local/hermes/janeagi-496912-d8d1d7f16e80.json"
    region: "global"
    model: "google/gemini-3.5-flash"
    timeout: 30
    extra_body:
      reasoning_effort: "minimal"
  vertex_curator:          # ↔ auxiliary.curator  (fact curation + supersession)
    type: "vertex"
    credentials_path: "D:/AppData/Local/hermes/janeagi-496912-d8d1d7f16e80.json"
    region: "global"
    model: "google/gemini-3.5-flash"
    timeout: 600
    extra_body:
      reasoning_effort: "minimal"

storage:
  backend: "sqlite"
  sqlite:
    path: ".virtualcontext/store.db"

facts:
  graph_links: true

supersession:
  enabled: true
  provider: "vertex_curator"  # ↔ Hermes auxiliary.curator
  model: "google/gemini-3.5-flash"
  batch_size: 20

curation:
  enabled: true
  provider: "vertex_curator"  # ↔ Hermes auxiliary.curator
  model: "google/gemini-3.5-flash"
  max_response_tokens: 2048

tool_output:
  enabled: true
  default_truncate_threshold: 8192
  max_index_bytes: 524288
  default_head_ratio: 0.6
  default_tail_ratio: 0.4

assembly:
  core_context_max_tokens: 18000
  tag_context_max_tokens: 30000
  facts_max_tokens: 20000
  context_hint_enabled: true
  context_hint_max_tokens: 2000
  core_files:
    - path: "D:/Documents/hermes/SOUL.md"
      priority: 10

retrieval:
  skip_active_tags: true
  active_tag_lookback: 4
  inbound_tagger_type: "embedding"
  embedding_model: "all-MiniLM-L6-v2"
  embedding_threshold: 0.3
  strategy_config:
    default:
      min_overlap: 1
      max_results: 10
      max_budget_fraction: 0.25
      include_related: true

telemetry:
  enabled: false
  models_file: "models.yaml"